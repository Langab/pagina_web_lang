<script>
/* ============================================================
   SISTEMA BILINGÜE — Navegación por páginas separadas
   ES: index.html, about.html, trabajos.html, publicaciones.html
   EN: index-en.html, about-en.html, trabajos-en.html, publicaciones-en.html

   El toggle ES|EN es simplemente un <a href> que apunta a la
   contrapartida de la página actual.

   ✨ NUEVO: Traducción dinámica del navbar cuando cambias idioma.
============================================================ */

(function () {

  // ── Detectar idioma actual ─────────────────────────────
  var path = window.location.pathname;
  var isEn = path.indexOf('-en.html') !== -1 || path.indexOf('-en/') !== -1;

  // ── Diccionario de traducciones del navbar ─────────────
  var navbarTexts = {
    es: {
      'index.html':          'Inicio',
      'publicaciones.html':  'Publicaciones',
      'trabajos.html':       'Trabajos, proyectos y consultoría',
      'blog/index.html':     'Blog',
      'portafolio/index.html': 'Portafolio',
      'about.html':          'CV'
    },
    en: {
      'index.html':          'Home',
      'publicaciones.html':  'Publications',
      'trabajos.html':       'Works, Projects & Consulting',
      'blog/index.html':     'Blog',
      'portafolio/index.html': 'Portfolio',
      'about.html':          'CV'
    }
  };

  // ── Calcular URL de la contrapartida ──────────────────
  function getCounterpart() {
    if (isEn) {
      // EN → ES: quitar "-en"
      return path.replace('-en.html', '.html').replace('-en/', '/');
    } else {
      // ES → EN: agregar "-en" antes de ".html"
      // Caso especial: ruta raíz "/" → "/index-en.html"
      if (path === '/' || path.endsWith('/')) {
        return path.replace(/\/$/, '') + '/index-en.html';
      }
      return path.replace('.html', '-en.html');
    }
  }

  var counterpart = getCounterpart();

  // ── Map de páginas EN ──────────────────────────────────
  var enPageMap = {
    'index.html':         'index-en.html',
    'publicaciones.html': 'publicaciones-en.html',
    'trabajos.html':      'trabajos-en.html',
    'blog/index.html':    'blog/index.html',           // Blog no cambia de nombre
    'portafolio/index.html': 'portafolio-en/index.html', // Portafolio ES → EN
    'about.html':         'about-en.html'
  };

  // ── Detectar si un link es la página actual ──────────
  function isCurrentPage(linkHref) {
    // Limpiar la ruta actual
    var currentPath = path;
    if (currentPath.endsWith('/')) {
      currentPath = currentPath.replace(/\/$/, '/index.html');
    }

    // Limpiar el href del link
    var cleanHref = linkHref;
    if (cleanHref.endsWith('/')) {
      cleanHref = cleanHref.replace(/\/$/, '/index.html');
    }

    // Extraer el nombre del archivo
    var currentFile = currentPath.split('/').pop();
    var linkFile = cleanHref.split('/').pop();

    // Casos especiales
    if (currentFile === '' || currentFile === '/') currentFile = 'index.html';
    if (linkFile === '' || linkFile === '/') linkFile = 'index.html';

    return currentFile === linkFile;
  }

  // ── Actualizar links y TEXTOS del navbar ──────────────
  function fixNavbarLinks() {
    document.querySelectorAll('.navbar-nav .nav-link').forEach(function (link) {
      var href = link.getAttribute('href');
      if (!href) return;

      var file = href.split('/').pop();
      var langDict = isEn ? navbarTexts.es : navbarTexts.en;

      // Buscar en el diccionario con la ruta completa
      var fullPath = href.replace(path.split('/').slice(0, -1).join('/'), '').replace(/^\//, '');

      // Actualizar el href si estamos en EN
      if (isEn && enPageMap[file]) {
        link.setAttribute('href', href.replace(file, enPageMap[file]));
      } else if (!isEn) {
        // Si estamos en ES y el link apunta a EN, actualizarlo a ES
        var currentFile = link.getAttribute('href').split('/').pop();
        var esFile = Object.keys(enPageMap).find(k => enPageMap[k] === currentFile);
        if (esFile) {
          link.setAttribute('href', link.getAttribute('href').replace(currentFile, esFile));
        }
      }

      // Actualizar TEXTO del link
      Object.keys(navbarTexts.es).forEach(function (page) {
        if (href.includes(page.replace('.html', '')) || (page === 'index.html' && (href === '/' || href === 'index.html'))) {
          var textoES = navbarTexts.es[page];
          var textoEN = navbarTexts.en[page];
          link.textContent = isEn ? textoEN : textoES;
        }
      });

      // ✨ RESALTAR ENLACE ACTIVO
      if (isCurrentPage(href)) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
  }

  // ── Inyectar toggle en el navbar ──────────────────────
  function injectToggle() {
    if (document.getElementById('lang-toggle-wrap')) return true;

    var nav =
      document.querySelector('.navbar-nav.ms-auto') ||
      document.querySelector('.navbar-nav-scroll.ms-auto') ||
      document.querySelector('#navbarCollapse .navbar-nav') ||
      document.querySelector('.navbar-nav:last-of-type');

    if (!nav) return false;

    var li = document.createElement('li');
    li.className = 'nav-item lang-toggle-item';
    li.innerHTML =
      '<div id="lang-toggle-wrap" class="lang-toggle">' +
        '<a href="' + (isEn ? counterpart : path) + '" class="lang-btn' + (isEn ? '' : ' active') + '">ES</a>' +
        '<a href="' + (isEn ? path : counterpart) + '" class="lang-btn' + (isEn ? ' active' : '') + '">EN</a>' +
      '</div>';
    nav.appendChild(li);
    return true;
  }

  // ── Inicializar con reintentos ─────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    fixNavbarLinks();

    var attempts = 0;
    var timer = setInterval(function () {
      attempts++;
      if (injectToggle() || attempts >= 20) clearInterval(timer);
    }, 100);
  });

}());
</script>
