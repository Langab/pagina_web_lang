<script>
/* ============================================================
   SISTEMA BILINGÜE — Navegación por páginas separadas
   ES: index.html, about.html, trabajos.html, publicaciones.html
   EN: index-en.html, about-en.html, trabajos-en.html, publicaciones-en.html
       portafolio-en/index.html

   ✅ FIXES:
   1. isCurrentPage() usa resolución de pathname absoluto (fix bug
      de index.html == blog/index.html == portafolio/index.html)
   2. Mapeo portafolio ES→EN corregido: portafolio-en/index.html
   3. getCounterpart() maneja portafolio correctamente
   4. Detección de isEn incluye /portafolio-en/
============================================================ */

(function () {

  var path = window.location.pathname;

  // Detectar idioma actual (incluye portafolio-en)
  var isEn = path.indexOf('-en.html') !== -1 || path.indexOf('/portafolio-en/') !== -1;

  // ── Diccionario de textos del navbar ──────────────────
  var navbarTexts = {
    es: {
      'index.html':            'Inicio',
      'publicaciones.html':    'Publicaciones',
      'trabajos.html':         'Trabajos, proyectos y consultoría',
      'blog/index.html':       'Blog',
      'portafolio/index.html': 'Portafolio',
      'about.html':            'CV'
    },
    en: {
      'index.html':            'Home',
      'publicaciones.html':    'Publications',
      'trabajos.html':         'Works, Projects & Consulting',
      'blog/index.html':       'Blog',
      'portafolio/index.html': 'Portfolio',
      'about.html':            'CV'
    }
  };

  // ── Mapa ES → EN (rutas completas) ────────────────────
  var enPageMap = {
    'index.html':            'index-en.html',
    'publicaciones.html':    'publicaciones-en.html',
    'trabajos.html':         'trabajos-en.html',
    'blog/index.html':       'blog/index.html',
    'portafolio/index.html': 'portafolio-en/index.html',
    'about.html':            'about-en.html'
  };

  // ── Resolver href relativo → pathname absoluto ────────
  // Usa un <a> temporal para que el navegador resuelva la URL
  // correctamente sin importar la profundidad de la página actual.
  function resolveHref(href) {
    var a = document.createElement('a');
    a.href = href;
    var p = a.pathname;
    if (p.endsWith('/')) p += 'index.html';
    return p;
  }

  // ── Calcular URL de la contraparte de idioma ──────────
  function getCounterpart() {
    if (isEn) {
      // EN → ES: portafolio-en/ → portafolio/ | quitar -en.html
      return path
        .replace('/portafolio-en/', '/portafolio/')
        .replace('-en.html', '.html');
    } else {
      // ES → EN
      if (path.indexOf('/portafolio/') !== -1) {
        // portafolio/index.html → portafolio-en/index.html
        return path.replace('/portafolio/', '/portafolio-en/');
      }
      if (path === '/' || path.endsWith('/')) {
        return path.replace(/\/$/, '') + '/index-en.html';
      }
      return path.replace('.html', '-en.html');
    }
  }

  var counterpart = getCounterpart();

  // ── Encontrar clave ES de navbarTexts para un pathname ─
  // Itera en orden de inserción; claves más específicas (blog/index.html,
  // portafolio/index.html) vienen después de index.html, así el último
  // match más específico gana.
  function findEsKey(pathname) {
    var matched = null;

    // 1. Buscar entre rutas ES conocidas
    Object.keys(navbarTexts.es).forEach(function (k) {
      if (pathname.endsWith('/' + k)) matched = k;
    });

    // 2. Si no encontró, buscar por ruta EN conocida (mapeo inverso)
    if (!matched) {
      Object.keys(enPageMap).forEach(function (k) {
        var enVal = enPageMap[k];
        if (pathname.endsWith('/' + enVal)) matched = k;
      });
    }

    return matched;
  }

  // ── Actualizar links, textos y estado activo ──────────
  function fixNavbarLinks() {
    var currentNorm = path.replace(/\/$/, '/index.html');

    document.querySelectorAll('.navbar-nav .nav-link').forEach(function (link) {
      var href = link.getAttribute('href');
      if (!href || href.match(/^(https?:|mailto:|#)/)) return;

      // Resolver a pathname absoluto para comparaciones fiables
      var resolvedPath = resolveHref(href);
      var esKey = findEsKey(resolvedPath);

      if (esKey) {
        // 1. Actualizar texto al idioma actual
        link.textContent = isEn ? navbarTexts.en[esKey] : navbarTexts.es[esKey];

        // 2. Actualizar href al idioma actual usando ruta completa
        if (isEn && enPageMap[esKey]) {
          var enPath = enPageMap[esKey];
          link.setAttribute('href', resolvedPath.replace('/' + esKey, '/' + enPath));
        } else if (!isEn) {
          // Restaurar a ES si el link ya apuntaba a EN
          var enVal = enPageMap[esKey];
          if (enVal && resolvedPath.endsWith('/' + enVal)) {
            link.setAttribute('href', resolvedPath.replace('/' + enVal, '/' + esKey));
          }
        }
      }

      // 3. Marcar como activo SOLO si es exactamente la página actual
      var finalResolved = resolveHref(link.getAttribute('href'));
      if (finalResolved === currentNorm) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
  }

  // ── Inyectar toggle ES|EN en el navbar ────────────────
  function injectToggle() {
    if (document.getElementById('lang-toggle-wrap')) return true;

    var nav =
      document.querySelector('.navbar-nav.ms-auto') ||
      document.querySelector('.navbar-nav-scroll.ms-auto') ||
      document.querySelector('#navbarCollapse .navbar-nav') ||
      document.querySelector('.navbar-nav:last-of-type');

    if (!nav) return false;

    var li = document.createElement('li');
    li.className = 'nav-item lang-toggle-item';
    li.innerHTML =
      '<div id="lang-toggle-wrap" class="lang-toggle">' +
        '<a href="' + (isEn ? counterpart : path) + '" class="lang-btn' + (isEn ? '' : ' active') + '">ES</a>' +
        '<a href="' + (isEn ? path : counterpart) + '" class="lang-btn' + (isEn ? ' active' : '') + '">EN</a>' +
      '</div>';
    nav.appendChild(li);
    return true;
  }

  // ── Inicializar ───────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    fixNavbarLinks();

    var attempts = 0;
    var timer = setInterval(function () {
      attempts++;
      if (injectToggle() || attempts >= 20) clearInterval(timer);
    }, 100);
  });

}());
</script>
