// 🔄 FUNCIÓN PRINCIPAL: aplicar traducciones
// -------------------------------------------------------
function applyTranslations(lang) {
  // 1. Elementos con data-i18n="clave"
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (lang === 'en' && i18n.en[key] !== undefined) {
      if (!el.hasAttribute('data-es')) el.setAttribute('data-es', el.innerHTML);
      el.innerHTML = i18n.en[key];
    } else if (lang === 'es') {
      var orig = el.getAttribute('data-es');
      if (orig !== null) el.innerHTML = orig;
    }
  });

  // 2. Navbar links (generados por Quarto YAML, no tienen data-i18n)
  var navMap = {
    'Inicio': 'Home',
    'Publicaciones': 'Publications',
    'Trabajos, proyectos y consultoría': 'Work, Projects & Consulting',
    'Blog': 'Blog',
    'CV': 'CV'
  };
  document.querySelectorAll('.navbar-nav .nav-link').forEach(function(link) {
    var txt = link.textContent.trim();
    if (lang === 'en') {
      if (!link.getAttribute('data-es')) link.setAttribute('data-es', txt);
      var esKey = link.getAttribute('data-es');
      if (navMap[esKey]) link.textContent = navMap[esKey];
    } else {
      var orig = link.getAttribute('data-es');
      if (orig) link.textContent = orig;
    }
  });

  // 3. Blog callout (si existe)
  var blogCallout = document.querySelector('.callout-note .callout-body p');
  if (blogCallout && i18n.en['blog.nopost']) {
    if (lang === 'en') {
      if (!blogCallout.getAttribute('data-es')) blogCallout.setAttribute('data-es', blogCallout.innerHTML);
      blogCallout.innerHTML = i18n.en['blog.nopost'];
    } else {
      var orig = blogCallout.getAttribute('data-es');
      if (orig) blogCallout.innerHTML = orig;
    }
  }

  // 4. Footer text
  var footer = document.querySelector('.nav-footer-center p, .nav-footer p');
  if (footer) {
    if (lang === 'en') {
      if (!footer.getAttribute('data-es')) footer.setAttribute('data-es', footer.innerHTML);
      footer.innerHTML = footer.innerHTML
        .replace('Hecho con', 'Built with')
        .replace('y R', 'and R');
    } else {
      var orig = footer.getAttribute('data-es');
      if (orig) footer.innerHTML = orig;
    }
  }

  // 5. Actualizar botones del toggle
  var btnEs = document.getElementById('lang-btn-es');
  var btnEn = document.getElementById('lang-btn-en');
  if (btnEs) btnEs.classList.toggle('active', lang === 'es');
  if (btnEn) btnEn.classList.toggle('active', lang === 'en');

  // 6. Guardar preferencia
  try { localStorage.setItem('bl-lang', lang); } catch(e) {}
  window._blLang = lang;
}

// -------------------------------------------------------
// 🔘 INYECTAR BOTÓN EN NAVBAR
// -------------------------------------------------------
function injectLangToggle() {
  // Quarto pone los íconos de la derecha en .navbar-nav.ms-auto o similar
  var navRight = document.querySelector('.navbar-nav.ms-auto');
  if (!navRight) navRight = document.querySelector('.navbar-nav:last-of-type');
  if (!navRight) return;

  var li = document.createElement('li');
  li.className = 'nav-item lang-toggle-item';
  li.innerHTML = [
    '<div class="lang-toggle">',
    '  <button id="lang-btn-es" class="lang-btn active" ',
    '    onclick="applyTranslations(\'es\')">ES</button>',
    '  <span class="lang-sep">|</span>',
    '  <button id="lang-btn-en" class="lang-btn" ',
    '    onclick="applyTranslations(\'en\')">EN</button>',
    '</div>'
  ].join('');
  navRight.appendChild(li);
}

// -------------------------------------------------------
// 🚀 INICIALIZAR
// -------------------------------------------------------
document.addEventListener('DOMContentLoaded', function() {
  injectLangToggle();
  // Restaurar preferencia guardada
  try {
    var saved = localStorage.getItem('bl-lang');
    if (saved && saved === 'en') {
      setTimeout(function() { applyTranslations('en'); }, 50);
    }
  } catch(e) {}
});
</script>
