project:
  type: website
  output-dir: docs

website:
  site-url: "https://langab.github.io/pagina_web_lang"
  title: "Benjamín Lang"
  description: "Sociólogo | Analista de datos | Investigador en ciencia de datos"
  favicon: img/favicon.png

  navbar:
    logo: img/logo.png
    left:
      - href: index.qmd
        text: Inicio
      - href: investigacion.qmd
        text: Investigación
      - href: blog/index.qmd
        text: Blog
      - href: about.qmd
        text: CV
    right:
      - icon: github
        href: https://github.com/Langab
      - icon: linkedin
        href: https://www.linkedin.com/in/benjamin-lang-a78229207/
      - icon: envelope
        href: mailto:benjalang1997@gmail.com

  page-footer:
    left: "Hecho con [Quarto](https://quarto.org) y R"
    right: "© 2026 Benjamín Lang"

  comments:
    giscus:
      repo: Langab/pagina_web_lang   # comentarios vía GitHub (opcional)

format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: true          # los chunks de código quedan plegados por defecto
    code-tools: true         # botón para copiar código
    highlight-style: arrow
    fig-align: center

execute:
  freeze: auto               # re-ejecuta sólo los .qmd que cambiaron
  warning: false
  message: false
